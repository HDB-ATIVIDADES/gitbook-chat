<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitBook Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/marked.min.js"></script>
  <script src="/app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script defer src="/js/alpine.min.js"></script>
  <style>
    .sidebar-scroll::-webkit-scrollbar { width: 6px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .ask-btn {
      background-color: #BBDDE5; color: #1f2937; font-size: 0.75rem; font-weight: 500;
      padding: 0.375rem 0.875rem; border-radius: 9999px; margin: 0.125rem; border: none;
      cursor: pointer; transition: background-color 0.2s; display: inline-block; line-height: 1.5;
    }
    .ask-btn:hover { background-color: #aacdd5; }
    .card-enter { animation: cardIn 0.3s ease-out; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-content h1 { font-size: 1.25rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #f3f4f6; }
    .msg-content h2 { font-size: 1.1rem; font-weight: 600; margin: 0.75rem 0 0.5rem; color: #e5e7eb; }
    .msg-content h3 { font-size: 1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #d1d5db; }
    .msg-content p { margin: 0.5rem 0; line-height: 1.7; }
    .msg-content ul, .msg-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .msg-content li { margin: 0.25rem 0; }
    .msg-content strong { font-weight: 600; color: #f3f4f6; }
    .msg-content em { font-style: italic; }
    .msg-content code {
      background: #1f2937; padding: 0.125rem 0.375rem; border-radius: 0.25rem;
      font-size: 0.8rem; color: #fbbf24;
    }
    .msg-content pre {
      background: #111827; padding: 0.75rem; border-radius: 0.5rem;
      overflow-x: auto; margin: 0.5rem 0; border: 1px solid #1f2937;
    }
    .msg-content pre code { background: none; padding: 0; color: inherit; }
    .msg-content a { color: #818cf8; text-decoration: underline; }
    .msg-content a:hover { color: #a5b4fc; }
    .msg-content hr { border-color: #374151; margin: 1rem 0; }
    .msg-content blockquote {
      border-left: 3px solid #BBDDE5; padding-left: 0.75rem; margin: 0.5rem 0;
      color: #9ca3af; font-style: italic;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen overflow-hidden">
  <div x-data="chat()" class="flex h-full">

    <!-- Sidebar collapsed toggle -->
    <div x-show="sidebarCollapsed"
      class="w-8 bg-gray-950 border-r border-gray-800 flex flex-col items-center pt-3 shrink-0">
      <button @click="sidebarCollapsed = false"
        class="p-1 hover:bg-gray-800 rounded transition text-gray-500 hover:text-gray-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- Sidebar -->
    <aside x-show="!sidebarCollapsed"
      class="w-72 bg-gray-950 border-r border-gray-800 flex flex-col shrink-0" x-transition>
      <div class="p-3 border-b border-gray-800 shrink-0 flex items-center justify-between">
        <div class="text-[11px] text-gray-500 font-semibold uppercase tracking-wider">Histórico</div>
        <button @click="sidebarCollapsed = true"
          class="p-1 hover:bg-gray-800 rounded transition text-gray-500 hover:text-gray-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
          </svg>
        </button>
      </div>

      <!-- Welcome entry -->
      <div class="px-2 pt-2">
        <button @click="scrollToMsg('welcome')" data-card-id="msg-welcome"
          class="w-full flex items-center justify-between px-3 py-2.5 text-left hover:bg-gray-800/80 rounded-lg transition text-sm group">
          <div class="flex items-center gap-2 min-w-0">
            <svg class="w-4 h-4 shrink-0 text-[#BBDDE5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="font-medium text-[#BBDDE5] truncate" x-text="welcomeQuestion"></span>
          </div>
          <a href="/download/readme.md" @click.stop
            class="shrink-0 p-1 text-gray-500 hover:text-gray-200 hover:bg-gray-700 rounded transition"
            title="Baixar README">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
          </a>
        </button>
      </div>

      <div class="border-t border-gray-800 mx-2 my-2"></div>

      <!-- History items -->
      <div class="flex-1 overflow-y-auto sidebar-scroll px-2 pb-2 space-y-0.5">
        <template x-for="item in history" :key="item.filename">
          <button @click="scrollToMsg(item.filename)"
            :data-card-id="'msg-' + item.filename.replace('.md', '')"
            class="w-full px-3 py-2.5 text-left hover:bg-gray-800/80 transition rounded-lg text-sm group"
            :title="item.question"
            :class="{'bg-gray-700/50': openCard === 'msg-' + item.filename.replace('.md', '')}">
            <div class="text-[11px] text-gray-500 mb-0.5" x-text="formatDate(item.date)"></div>
            <div class="truncate text-gray-300" x-text="item.question"></div>
          </button>
        </template>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- Top bar -->
      <header class="border-b border-gray-800 px-4 py-2.5 flex items-center justify-between shrink-0 bg-gray-900/80 backdrop-blur-sm">
        <img src="gitbook.svg" alt="Logo" class="w-5 h-5">
        <span class="text-sm font-semibold text-gray-200">GitBook Chat</span>
      </header>

      <!-- Messages -->
      <div class="flex-1 overflow-y-auto chat-scroll" x-ref="chatarea">
        <!-- Initial loading spinner -->
        <div x-show="initialLoading"
          class="flex items-center justify-center h-full">
          <div class="flex space-x-2">
            <div class="w-3 h-3 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0s"></div>
            <div class="w-3 h-3 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0.15s"></div>
            <div class="w-3 h-3 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0.3s"></div>
          </div>
        </div>
        <div class="max-w-6xl mx-auto px-6 py-6 space-y-3"
          x-show="!initialLoading">
          <template x-for="msg in messages" :key="msg.id">
            <div :id="msg.id" class="card-enter">

              <!-- User message -->
              <div x-show="msg.role === 'user'" class="flex justify-end mb-1">
                <div class="bg-[#BBDDE5]/10 text-gray-100 rounded-2xl px-4 py-2.5 max-w-[75%] text-sm leading-relaxed">
                  <p x-text="msg.content"></p>
                </div>
              </div>

              <!-- Assistant card -->
              <div x-show="msg.role === 'assistant'"
                class="border border-gray-700/50 rounded-lg overflow-hidden bg-gray-900/60">
                <button @click="toggleCard(msg.id)"
                  class="w-full flex items-center gap-2.5 px-4 py-2.5 bg-gray-800/30 hover:bg-gray-800 text-left text-sm font-medium text-gray-300 transition">
                  <svg class="w-4 h-4 shrink-0 transition-transform duration-200"
                    :class="{'rotate-90': openCard !== msg.id}"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 9l6 6 6-6"/>
                  </svg>
                  <svg class="w-4 h-4 shrink-0 text-[#BBDDE5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                  <span class="truncate" x-text="msg.question || 'Resposta'"></span>
                </button>
                <div x-show="openCard === msg.id"
                  class="px-4 py-3 msg-content border-t border-gray-700/50 text-sm"
                  x-html="renderedContent[msg.id] || ''">
                </div>
              </div>

            </div>
          </template>

          <div x-show="loading" class="flex justify-start py-2">
            <div class="flex space-x-1.5 px-1">
              <div class="w-2 h-2 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0s"></div>
              <div class="w-2 h-2 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0.15s"></div>
              <div class="w-2 h-2 bg-[#BBDDE5] rounded-full animate-bounce" style="animation-delay:0.3s"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="border-t border-gray-800/50 p-4">
        <div class="max-w-6xl mx-auto">
          <div class="relative">
            <input type="text" x-model="input" @keydown.enter="ask()"
              placeholder="Digite sua pergunta..."
              :disabled="loading"
              x-ref="chatinput"
              class="w-full bg-gray-800 text-gray-100 rounded-xl pl-4 pr-12 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#BBDDE5]/50 focus:border-[#BBDDE5] border border-gray-700 placeholder-gray-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <button @click="ask()" :disabled="loading || !input.trim()"
              class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-[#BBDDE5] hover:bg-[#BBDDE5]/80 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg p-2 text-gray-900 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Toasts -->
    <template x-for="t in toasts" :key="t.id">
      <div x-show="t === toasts[0]" x-transition.duration.300ms
        class="fixed bottom-6 right-6 z-50 flex items-center gap-2.5 px-4 py-3 rounded-lg shadow-lg text-sm font-medium"
        :class="t.type === 'error' ? 'bg-red-800 text-red-100' : 'bg-green-800 text-green-100'">
        <template x-if="t.type === 'error'">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </template>
        <template x-if="t.type !== 'error'">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </template>
        <span x-text="t.message"></span>
      </div>
    </template>

  </div>
</body>
</html>
